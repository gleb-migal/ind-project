<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог автомобилей - AutoSelect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00d9ff;
            --secondary-color: #ff3366;
            --dark-bg: #0a0e1a;
            --card-bg: #141824;
            --accent-gradient: linear-gradient(135deg, #00d9ff 0%, #ff3366 100%);
            --text-primary: #ffffff;
            --text-secondary: #a8b3cf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 217, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 51, 102, 0.08) 0%, transparent 50%);
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(0, 217, 255, 0.5)); }
            50% { filter: drop-shadow(0 0 15px rgba(0, 217, 255, 0.8)); }
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 400;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gradient);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--primary-color);
        }

        .catalog-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8rem 3rem 4rem;
        }

        .catalog-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .catalog-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .catalog-header p {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .filters {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 3rem;
            border: 1px solid rgba(0, 217, 255, 0.1);
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-group label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 0.9rem;
            background: var(--dark-bg);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        .filter-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
        }

        .filter-btn.apply {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }

        .filter-btn.apply:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 217, 255, 0.5);
        }

        .filter-btn.reset {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .filter-btn.reset:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
            margin-bottom: 3rem;
        }

        .car-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 217, 255, 0.1);
            transition: all 0.4s ease;
            animation: fadeInUp 0.6s ease-out backwards;
            cursor: pointer;
        }

        .car-card:nth-child(1) { animation-delay: 0.1s; }
        .car-card:nth-child(2) { animation-delay: 0.2s; }
        .car-card:nth-child(3) { animation-delay: 0.3s; }
        .car-card:nth-child(4) { animation-delay: 0.4s; }
        .car-card:nth-child(5) { animation-delay: 0.5s; }
        .car-card:nth-child(6) { animation-delay: 0.6s; }

        .car-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 217, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 217, 255, 0.2);
        }

        .car-image {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .car-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .car-card:hover .car-image img {
            transform: scale(1.1);
        }

        .car-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .car-card:hover .car-image::before {
            left: 100%;
        }

        .car-info {
            padding: 1.8rem;
        }

        .car-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            color: var(--primary-color);
        }

        .car-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .spec-icon {
            color: var(--primary-color);
        }

        .car-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .car-location {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .view-btn {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .view-btn:hover {
            background: var(--primary-color);
            color: var(--dark-bg);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        footer {
            background: var(--card-bg);
            padding: 3rem;
            text-align: center;
            border-top: 1px solid rgba(0, 217, 255, 0.2);
        }

        footer p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .catalog-header h1 {
                font-size: 2.5rem;
            }

            nav {
                padding: 1rem 1.5rem;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .cars-grid {
                grid-template-columns: 1fr;
            }

            .catalog-container {
                padding: 7rem 1.5rem 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">AUTOSELECT</div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html" class="active">Каталог</a></li>
            </ul>
        </nav>
    </header>

    <div class="catalog-container">
        <div class="catalog-header">
            <h1>Каталог автомобилей</h1>
            <p>Найдено: <span id="carCount">12</span> автомобилей</p>
        </div>

        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Марка</label>
                    <select id="brandFilter">
                        <option value="">Все марки</option>
                        <option value="toyota">Toyota</option>
                        <option value="bmw">BMW</option>
                        <option value="mercedes">Mercedes-Benz</option>
                        <option value="audi">Audi</option>
                        <option value="honda">Honda</option>
                        <option value="volkswagen">Volkswagen</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Год от</label>
                    <input type="number" id="yearFrom" placeholder="2015" min="1990" max="2026">
                </div>
                <div class="filter-group">
                    <label>Цена до (₽)</label>
                    <input type="number" id="priceMax" placeholder="5000000" min="0">
                </div>
                <div class="filter-group">
                    <label>Трансмиссия</label>
                    <select id="transmissionFilter">
                        <option value="">Все типы</option>
                        <option value="автомат">Автомат</option>
                        <option value="механика">Механика</option>
                        <option value="робот">Робот</option>
                        <option value="вариатор">Вариатор</option>
                    </select>
                </div>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn apply" onclick="applyFilters()">Применить фильтры</button>
                <button class="filter-btn reset" onclick="resetFilters()">Сбросить</button>
            </div>
        </div>

        <div class="cars-grid" id="carsGrid">
        </div>
    </div>

    <footer>
        <p>&copy; 2026 AutoSelect. Все права защищены.</p>
    </footer>

    <script>
        const cars = [
            {
                id: 1,
                brand: 'Toyota',
                model: 'Camry',
                year: 2021,
                price: 2500000,
                mileage: 45000,
                engine: '2.5L',
                transmission: 'Автомат',
                body: 'Седан',
                location: 'Москва',
                image: 'kartinki/car1.jpg'
            },
            {
                id: 2,
                brand: 'BMW',
                model: 'X5',
                year: 2020,
                price: 5000000,
                mileage: 38000,
                engine: '3.0L',
                transmission: 'Автомат',
                body: 'Кроссовер',
                location: 'Санкт-Петербург',
                image: 'kartinki/car2.jpg'
            },
            {
                id: 3,
                brand: 'Mercedes-Benz',
                model: 'E-Class',
                year: 2022,
                price: 5600000,
                mileage: 22000,
                engine: '2.0L',
                transmission: 'Автомат',
                body: 'Седан',
                location: 'Краснодар',
                image: 'kartinki/car3.jpg'
            },
            {
                id: 4,
                brand: 'Audi',
                model: 'Q7',
                year: 2021,
                price: 6000000,
                mileage: 31000,
                engine: '3.0L',
                transmission: 'Автомат',
                body: 'Кроссовер',
                location: 'Санкт-Петербург',
                image: 'kartinki/car4.jpg'
            },
            {
                id: 5,
                brand: 'Honda',
                model: 'Accord',
                year: 2020,
                price: 1900000,
                mileage: 52000,
                engine: '2.4L',
                transmission: 'Автомат',
                body: 'Седан',
                location: 'Санкт-Петербург',
                image: 'kartinki/car5.jpg'
            },
            {
                id: 6,
                brand: 'Volkswagen',
                model: 'Tiguan',
                year: 2021,
                price: 3100000,
                mileage: 28000,
                engine: '2.0L',
                transmission: 'Автомат',
                body: 'Кроссовер',
                location: 'Москва',
                image: 'kartinki/car6.jpg'
            },
            {
                id: 7,
                brand: 'Toyota',
                model: 'RAV4',
                year: 2022,
                price: 3600000,
                mileage: 15000,
                engine: '2.5L',
                transmission: 'Автомат',
                body: 'Кроссовер',
                location: 'Краснодар',
                image: 'kartinki/car7.jpg'
            },
            {
                id: 8,
                brand: 'BMW',
                model: '3 Series',
                year: 2021,
                price: 3900000,
                mileage: 35000,
                engine: '2.0L',
                transmission: 'Автомат',
                body: 'Седан',
                location: 'Владивосток',
                image: 'kartinki/car8.jpg'
            },
            {
                id: 9,
                brand: 'Audi',
                model: 'A4',
                year: 2020,
                price: 3400000,
                mileage: 42000,
                engine: '2.0L',
                transmission: 'Автомат',
                body: 'Седан',
                location: 'Владивосток',
                image: 'kartinki/car9.jpg'
            },
            {
                id: 10,
                brand: 'Honda',
                model: 'CR-V',
                year: 2021,
                price: 2900000,
                mileage: 33000,
                engine: '2.4L',
                transmission: 'Автомат',
                body: 'Кроссовер',
                location: 'Челябинск',
                image: 'kartinki/car10.jpg'
            },
            {
                id: 11,
                brand: 'Mercedes-Benz',
                model: 'GLE',
                year: 2022,
                price: 7000000,
                mileage: 18000,
                engine: '3.0L',
                transmission: 'Автомат',
                body: 'Кроссовер',
                location: 'Челябинск',
                image: 'kartinki/car11.jpg'
            },
            {
                id: 12,
                brand: 'Volkswagen',
                model: 'Passat',
                year: 2020,
                price: 2200000,
                mileage: 48000,
                engine: '2.0L',
                transmission: 'Автомат',
                body: 'Седан',
                location: 'Ульяновск',
                image: 'kartinki/car12.jpg'
            }
        ];

        let filteredCars = [...cars];

        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }

        function renderCars(carsToRender) {
            const grid = document.getElementById('carsGrid');
            const carCount = document.getElementById('carCount');
            
            carCount.textContent = carsToRender.length;
            
            grid.innerHTML = carsToRender.map(car => `
                <div class="car-card">
                    <div class="car-image">
                        <img src="${car.image}" alt="${car.brand} ${car.model}" onerror="this.style.display='none'; this.parentElement.innerHTML='🚗';">
                    </div>
                    <div class="car-info">
                        <h3 class="car-title">${car.brand} ${car.model}</h3>
                        <div class="car-specs">
                            <div class="spec-item">
                                <span class="spec-icon">📅</span>
                                <span>${car.year} год</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-icon">⚡</span>
                                <span>${car.engine}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-icon">🛣️</span>
                                <span>${formatPrice(car.mileage)} км</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-icon">⚙️</span>
                                <span>${car.transmission}</span>
                            </div>
                        </div>
                        <div class="car-price">${formatPrice(car.price)} ₽</div>
                        <div class="car-location">
                            <span>📍</span>
                            <span>${car.location}</span>
                        </div>
                        <button class="view-btn" onclick="viewCar(${car.id})">Посмотреть</button>
                    </div>
                </div>
            `).join('');
        }

        function applyFilters() {
            const brand = document.getElementById('brandFilter').value.toLowerCase();
            const yearFrom = parseInt(document.getElementById('yearFrom').value) || 0;
            const priceMax = parseInt(document.getElementById('priceMax').value) || Infinity;
            const transmission = document.getElementById('transmissionFilter').value.toLowerCase();

            filteredCars = cars.filter(car => {
                const matchBrand = !brand || car.brand.toLowerCase() === brand;
                const matchYear = car.year >= yearFrom;
                const matchPrice = car.price <= priceMax;
                const matchTransmission = !transmission || car.transmission.toLowerCase() === transmission;
                
                return matchBrand && matchYear && matchPrice && matchTransmission;
            });

            renderCars(filteredCars);
        }

        function resetFilters() {
            document.getElementById('brandFilter').value = '';
            document.getElementById('yearFrom').value = '';
            document.getElementById('priceMax').value = '';
            document.getElementById('transmissionFilter').value = '';
            
            filteredCars = [...cars];
            renderCars(filteredCars);
        }

        function viewCar(id) {
            const car = cars.find(c => c.id === id);
            alert(`Вы выбрали: ${car.brand} ${car.model} (${car.year})\nЦена: ${formatPrice(car.price)} ₽\nЛокация: ${car.location}\n\nВ полной версии здесь откроется детальная страница автомобиля с фотографиями и контактами продавца.`);
        }

        renderCars(filteredCars);

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
